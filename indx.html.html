<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Story Builder — Telephone</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:Cairo,sans-serif; background:#0a0a0a; color:#fff; direction:rtl; min-height:100vh; }
  .app { max-width:500px; margin:0 auto; padding:16px; }
  h1 { font-size:20px; font-weight:900; text-align:center; margin-bottom:16px; color:#4CAF50; letter-spacing:1px; }

  .preview-box { width:100%; aspect-ratio:9/16; border-radius:20px; overflow:hidden;
    border:2px solid #1a3a1a; margin-bottom:16px; background:#0a0a0a;
    box-shadow:0 0 40px rgba(76,175,80,0.2); }
  canvas { width:100%; height:100%; display:block; }

  .card { background:#111; border:1px solid #1e2e1e; border-radius:16px; padding:16px; margin-bottom:12px; }
  .card-title { font-size:12px; color:#4CAF50; margin-bottom:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase; }

  .upload-btn { display:flex; align-items:center; justify-content:center; gap:10px; width:100%;
    padding:14px; border-radius:14px; border:2px dashed #4CAF50; background:rgba(76,175,80,0.07);
    color:#4CAF50; font-size:15px; font-weight:700; font-family:Cairo,sans-serif; cursor:pointer; transition:all 0.2s; }
  .upload-btn:active { background:rgba(76,175,80,0.15); transform:scale(0.98); }
  .upload-btn.uploaded { border-color:#fff; background:rgba(255,255,255,0.05); color:#fff; }

  .field { margin-bottom:10px; }
  .field label { font-size:12px; color:#555; display:block; margin-bottom:5px; }
  .field input { width:100%; padding:11px 14px; background:#0a0a0a; border:1px solid #1e2e1e;
    border-radius:10px; color:#fff; font-family:Cairo,sans-serif; font-size:14px; outline:none; transition:border 0.2s; }
  .field input:focus { border-color:#4CAF50; box-shadow:0 0 0 2px rgba(76,175,80,0.1); }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

  .save-btn { width:100%; padding:16px; border-radius:16px; border:none;
    background:linear-gradient(135deg,#2d7a2d,#4CAF50,#2d7a2d);
    color:#fff; font-size:17px; font-weight:900; font-family:Cairo,sans-serif;
    cursor:pointer; margin-top:4px; box-shadow:0 0 30px rgba(76,175,80,0.4); transition:all 0.2s; }
  .save-btn:active { transform:scale(0.97); }
  .save-btn:disabled { opacity:0.6; }
  .status { text-align:center; font-size:13px; color:#4CAF50; margin-top:8px; min-height:20px; font-weight:700; }
  .ios-hint { background:#0a1a0a; border:1px solid #1e3e1e; border-radius:12px; padding:12px 14px;
    font-size:12px; color:#4CAF50; line-height:1.6; margin-top:8px; display:none; }
  .ios-hint.show { display:block; }
</style>
</head>
<body>
<div class="app">
  <h1>📞 Telephone for Mobile</h1>

  <div class="preview-box" id="preview-box">
    <canvas id="story-canvas"></canvas>
  </div>

  <div class="card">
    <div class="card-title">📷 صورة المنتج</div>
    <input type="file" accept="image/*" id="img-input" style="display:none;" onchange="handleImage(event)">
    <button class="upload-btn" id="upload-btn" type="button" onclick="document.getElementById('img-input').click()">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <span id="file-label">اضغط لاختيار صورة</span>
    </button>
  </div>

  <div class="card">
    <div class="card-title">📱 المنتج</div>
    <div class="field"><label>اسم المنتج</label><input type="text" id="prod-name" value="iPhone 16 Pro Max" oninput="update()" dir="ltr"></div>
    <div class="field"><label>الوصف بالعربي</label><input type="text" id="prod-sub" value="أحدث إصدار من آبل" oninput="update()" dir="rtl"></div>
    <div class="grid2">
      <div class="field"><label>السعر</label><input type="text" id="prod-price" value="1,650,000" oninput="update()" dir="rtl"></div>
      <div class="field"><label>العملة</label><input type="text" id="prod-currency" value="د.ع" oninput="update()" dir="rtl"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">✅ المواصفات (بوكس لكل واحدة)</div>
    <div class="field"><label>مواصفة 1</label><input type="text" id="feat1" value="شاشة 6.9 انش Super Retina" oninput="update()" dir="rtl"></div>
    <div class="field"><label>مواصفة 2</label><input type="text" id="feat2" value="كاميرا 48MP — 4K ProRes" oninput="update()" dir="rtl"></div>
    <div class="field"><label>مواصفة 3</label><input type="text" id="feat3" value="شريحة A18 Pro" oninput="update()" dir="rtl"></div>
  </div>

  <div class="card">
    <div class="card-title">📍 التواصل</div>
    <div class="field"><label>رقم الواتساب</label><input type="text" id="phone-num" value="07811333337" oninput="update()" dir="ltr"></div>
    <div class="field"><label>العنوان</label><input type="text" id="address" value="المنصور - شارع مول بابلون" oninput="update()" dir="rtl"></div>
  </div>

  <button class="save-btn" id="btn-dl" onclick="downloadPNG()">⬇️ حفظ الستوري</button>
  <div class="status" id="status-msg"></div>
  <div class="ios-hint" id="ios-hint">📱 <strong>للحفظ على آيفون:</strong><br>اضغط مطولاً على الصورة ← Save to Photos</div>
</div>

const logoImg=new Image(); logoImg.onload=()=>update(); logoImg.src=LOGO_SRC;

function handleImage(e){
  const file=e.target.files[0]; if(!file)return;
  document.getElementById('upload-btn').classList.add('uploaded');
  document.getElementById('file-label').textContent='✅ '+file.name;
  const reader=new FileReader();
  reader.onload=ev=>{ const img=new Image(); img.onload=()=>{currentImg=img;update();}; img.src=ev.target.result; };
  reader.readAsDataURL(file);
}

function getVals(){
  return {
    name:     document.getElementById('prod-name').value,
    sub:      document.getElementById('prod-sub').value,
    price:    document.getElementById('prod-price').value,
    currency: document.getElementById('prod-currency').value,
    phone:    document.getElementById('phone-num').value,
    address:  document.getElementById('address').value,
    f1: document.getElementById('feat1').value,
    f2: document.getElementById('feat2').value,
    f3: document.getElementById('feat3').value,
  };
}

function rrPath(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}
function rr(ctx,x,y,w,h,r,fill){rrPath(ctx,x,y,w,h,r);ctx.fillStyle=fill;ctx.fill();}

function drawStory(ctx,v,s,img){
  const GRN='#4CAF50', LGRN='#7CFC00', WH='#ffffff', BK='#060606';

  // ── BACKGROUND ──
  ctx.fillStyle=BK; ctx.fillRect(0,0,W*s,H*s);

  // Green orb glow top-right
  let g=ctx.createRadialGradient((W+200)*s,-200*s,0,(W+200)*s,-200*s,700*s);
  g.addColorStop(0,'rgba(76,175,80,0.22)'); g.addColorStop(1,'transparent');
  ctx.fillStyle=g; ctx.fillRect(0,0,W*s,H*s);

  // White orb glow bottom-left
  g=ctx.createRadialGradient(-100*s,(H+100)*s,0,-100*s,(H+100)*s,500*s);
  g.addColorStop(0,'rgba(255,255,255,0.06)'); g.addColorStop(1,'transparent');
  ctx.fillStyle=g; ctx.fillRect(0,0,W*s,H*s);

  // Subtle dot grid
  ctx.fillStyle='rgba(76,175,80,0.08)';
  for(let x=0;x<W;x+=60) for(let y=0;y<H;y+=60){
    ctx.beginPath(); ctx.arc(x*s,y*s,2*s,0,Math.PI*2); ctx.fill();
  }

  // ── TOP GLOW LINE ──
  const tg=ctx.createLinearGradient(0,0,W*s,0);
  tg.addColorStop(0,'transparent'); tg.addColorStop(0.3,GRN);
  tg.addColorStop(0.7,LGRN); tg.addColorStop(1,'transparent');
  ctx.fillStyle=tg; ctx.fillRect(0,0,W*s,4*s);
  // second line softer
  const tg2=ctx.createLinearGradient(0,0,W*s,0);
  tg2.addColorStop(0,'transparent'); tg2.addColorStop(0.5,'rgba(76,175,80,0.3)'); tg2.addColorStop(1,'transparent');
  ctx.fillStyle=tg2; ctx.fillRect(0,4*s,W*s,8*s);

  // ── LOGO + BRAND ──
  if(logoImg.complete&&logoImg.naturalWidth){
    const lS=110*s;
    // glow ring
    ctx.shadowColor=GRN; ctx.shadowBlur=22*s;
    ctx.beginPath(); ctx.arc(75*s+lS/2,50*s+lS/2,lS/2+5*s,0,Math.PI*2);
    ctx.strokeStyle='rgba(76,175,80,0.5)'; ctx.lineWidth=2*s; ctx.stroke();
    ctx.shadowBlur=0;
    ctx.save();
    ctx.beginPath(); ctx.arc(75*s+lS/2,50*s+lS/2,lS/2,0,Math.PI*2); ctx.clip();
    ctx.drawImage(logoImg,75*s,50*s,lS,lS);
    ctx.restore();
  }
  ctx.fillStyle=WH; ctx.font=`900 ${42*s}px Arial,sans-serif`;
  ctx.textAlign='right'; ctx.textBaseline='top';
  ctx.fillText('TELEPHONE',(W-55)*s,60*s);
  ctx.fillStyle=GRN; ctx.font=`400 ${21*s}px Arial,sans-serif`;
  ctx.fillText('FOR MOBILE',(W-55)*s,112*s);

  // ── PRODUCT IMAGE ──
  const imgY=190*s, imgH=840*s, imgX=40*s, imgW=(W-80)*s, imgR=26*s;

  if(img){
    ctx.save();
    rrPath(ctx,imgX,imgY,imgW,imgH,imgR); ctx.clip();
    const ar=img.width/img.height, car=imgW/imgH;
    let dx,dy,dw,dh;
    if(ar>car){dh=imgH;dw=dh*ar;dx=imgX-(dw-imgW)/2;dy=imgY;}
    else{dw=imgW;dh=dw/ar;dx=imgX;dy=imgY-(dh-imgH)/2;}
    ctx.drawImage(img,dx,dy,dw,dh);
    // top overlay
    const ov1=ctx.createLinearGradient(0,imgY,0,imgY+180*s);
    ov1.addColorStop(0,'rgba(6,6,6,0.75)'); ov1.addColorStop(1,'transparent');
    ctx.fillStyle=ov1; ctx.fillRect(imgX,imgY,imgW,imgH);
    // bottom overlay
    const ov2=ctx.createLinearGradient(0,imgY+imgH-340*s,0,imgY+imgH);
    ov2.addColorStop(0,'transparent'); ov2.addColorStop(1,'rgba(6,6,6,0.92)');
    ctx.fillStyle=ov2; ctx.fillRect(imgX,imgY,imgW,imgH);
    ctx.restore();
  } else {
    rr(ctx,imgX,imgY,imgW,imgH,imgR,'#111');
    ctx.fillStyle='#2a2a2a'; ctx.font=`400 ${28*s}px Cairo,Arial`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('اضغط لاختيار صورة المنتج',W*s/2,imgY+imgH/2);
  }

  // Image green glow border
  ctx.shadowColor=GRN; ctx.shadowBlur=18*s;
  ctx.strokeStyle='rgba(76,175,80,0.35)'; ctx.lineWidth=2*s;
  rrPath(ctx,imgX,imgY,imgW,imgH,imgR); ctx.stroke();
  ctx.shadowBlur=0;

  // ── PRODUCT NAME below image ──
  ctx.fillStyle=WH; ctx.font=`900 ${54*s}px Cairo,Arial`;
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText(v.name, W*s/2, imgY+imgH+22*s);
  if(v.sub){
    ctx.fillStyle=LGRN; ctx.font=`400 ${28*s}px Cairo,Arial`;
    ctx.fillText(v.sub, W*s/2, imgY+imgH+86*s);
  }

  // ── SPEC BOXES ──
  const feats=[v.f1,v.f2,v.f3].filter(Boolean);
  const specStartY=imgY+imgH+128*s;
  const boxW=(W-80)*s, totalGap=16*s*(feats.length-1);
  const boxW_each=(boxW-totalGap)/feats.length;
  const boxH=100*s;

  feats.forEach((f,i)=>{
    const bx=40*s + i*(boxW_each+16*s);
    const by=specStartY;

    // Box bg with green glow
    ctx.shadowColor=GRN; ctx.shadowBlur=12*s;
    rr(ctx,bx,by,boxW_each,boxH,16*s,'rgba(76,175,80,0.1)');
    ctx.shadowBlur=0;

    // Border
    ctx.strokeStyle='rgba(76,175,80,0.5)'; ctx.lineWidth=1.5*s;
    rrPath(ctx,bx,by,boxW_each,boxH,16*s); ctx.stroke();

    // Green top accent line
    const lineG=ctx.createLinearGradient(bx,0,bx+boxW_each,0);
    lineG.addColorStop(0,'transparent'); lineG.addColorStop(0.5,LGRN); lineG.addColorStop(1,'transparent');
    ctx.fillStyle=lineG; ctx.fillRect(bx+16*s,by,boxW_each-32*s,3*s);

    // Text
    ctx.fillStyle=WH; ctx.font=`700 ${22*s}px Cairo,Arial`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    // wrap text if long
    const maxW=boxW_each-20*s;
    const words=f.split(' ');
    let lines=[],line='';
    words.forEach(w=>{ const t=line?line+' '+w:w; if(ctx.measureText(t).width>maxW&&line){lines.push(line);line=w;}else line=t; });
    if(line)lines.push(line);
    const lineH=28*s;
    const startY=by+boxH/2-(lines.length-1)*lineH/2;
    lines.forEach((l,li)=>ctx.fillText(l,bx+boxW_each/2,startY+li*lineH));
  });

  // ── PRICE CARD ──
  const pY=specStartY+boxH+28*s;
  const pW=(W-80)*s;

  // outer white glow
  ctx.shadowColor='rgba(255,255,255,0.15)'; ctx.shadowBlur=25*s;
  rr(ctx,40*s,pY,pW,200*s,26*s,'#0f0f0f');
  ctx.shadowBlur=0;

  // Green border
  const pBorderG=ctx.createLinearGradient(40*s,pY,40*s+pW,pY);
  pBorderG.addColorStop(0,GRN); pBorderG.addColorStop(0.5,LGRN); pBorderG.addColorStop(1,GRN);
  ctx.strokeStyle=pBorderG; ctx.lineWidth=2*s;
  rrPath(ctx,40*s,pY,pW,200*s,26*s); ctx.stroke();

  // inner top shine
  const shine=ctx.createLinearGradient(40*s,pY,40*s,pY+60*s);
  shine.addColorStop(0,'rgba(255,255,255,0.06)'); shine.addColorStop(1,'transparent');
  rr(ctx,50*s,pY+6*s,pW-20*s,60*s,16*s,shine);

  ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.font=`400 ${24*s}px Cairo,Arial`;
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText('السعر الحصري',W*s/2,pY+18*s);

  // Price with green glow
  ctx.shadowColor=LGRN; ctx.shadowBlur=20*s;
  ctx.fillStyle=WH; ctx.font=`900 ${88*s}px Cairo,Arial`;
  ctx.fillText(v.price,W*s/2,pY+48*s);
  ctx.shadowBlur=0;

  ctx.fillStyle=GRN; ctx.font=`700 ${28*s}px Cairo,Arial`;
  ctx.fillText(v.currency,W*s/2,pY+150*s);

  // ── CTA ──
  const ctaY=pY+232*s;
  // White glowing button
  ctx.shadowColor='rgba(255,255,255,0.2)'; ctx.shadowBlur=20*s;
  rr(ctx,60*s,ctaY,(W-120)*s,84*s,42*s,'rgba(255,255,255,0.06)');
  ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2*s;
  rrPath(ctx,60*s,ctaY,(W-120)*s,84*s,42*s); ctx.stroke();
  ctx.fillStyle=WH; ctx.font=`900 ${30*s}px Cairo,Arial`;
  ctx.textBaseline='middle';
  ctx.fillText('📲 تواصل معنا الآن',W*s/2,ctaY+42*s);

  // ── BOTTOM ──
  const botY=ctaY+108*s;
  // dark green bottom
  const botG=ctx.createLinearGradient(0,botY,0,H*s);
  botG.addColorStop(0,'rgba(10,20,10,0.95)'); botG.addColorStop(1,'rgba(5,15,5,1)');
  ctx.fillStyle=botG; ctx.fillRect(0,botY,W*s,(H*s-botY));

  // divider line
  const dl=ctx.createLinearGradient(0,0,W*s,0);
  dl.addColorStop(0,'transparent'); dl.addColorStop(0.5,GRN); dl.addColorStop(1,'transparent');
  ctx.fillStyle=dl; ctx.fillRect(0,botY,W*s,2*s);

  ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.font=`400 ${20*s}px Cairo,Arial`;
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText('للحجز والاستفسار يرجى إرسال رسالة',W*s/2,botY+16*s);

  ctx.shadowColor=GRN; ctx.shadowBlur=10*s;
  ctx.fillStyle=WH; ctx.font=`700 ${30*s}px Arial`;
  ctx.direction='ltr';
  ctx.fillText(v.phone,W*s/2,botY+46*s);
  ctx.direction='rtl';
  ctx.shadowBlur=0;

  ctx.fillStyle='rgba(76,175,80,0.8)'; ctx.font=`400 ${24*s}px Cairo,Arial`;
  ctx.fillText(v.address,W*s/2,botY+88*s);

  // bottom glow line
  const bl=ctx.createLinearGradient(0,0,W*s,0);
  bl.addColorStop(0,'transparent'); bl.addColorStop(0.3,GRN);
  bl.addColorStop(0.7,LGRN); bl.addColorStop(1,'transparent');
  ctx.fillStyle=bl; ctx.fillRect(0,H*s-5*s,W*s,5*s);
}

function update(){
  const box=document.getElementById('preview-box');
  const canvas=document.getElementById('story-canvas');
  const dpr=Math.min(window.devicePixelRatio||1,2);
  const dw=box.clientWidth, dh=box.clientHeight;
  canvas.width=dw*dpr; canvas.height=dh*dpr;
  canvas.style.width=dw+'px'; canvas.style.height=dh+'px';
  drawStory(canvas.getContext('2d'),getVals(),(dw*dpr)/W,currentImg);
}

function downloadPNG(){
  const btn=document.getElementById('btn-dl'), msg=document.getElementById('status-msg'), hint=document.getElementById('ios-hint');
  btn.textContent='⏳ جاري التصدير...'; btn.disabled=true;
  const off=document.createElement('canvas'); off.width=W; off.height=H;
  drawStory(off.getContext('2d'),getVals(),1,currentImg);
  setTimeout(()=>{
    const dataUrl=off.toDataURL('image/png');
    if(isIOS){
      const win=window.open();
      win.document.write('<html><body style="margin:0;background:#000;"><img src="'+dataUrl+'" style="width:100%;display:block;"><p style="font-family:sans-serif;text-align:center;padding:16px;color:#4CAF50;font-size:15px;">اضغط مطولاً على الصورة ← Save to Photos 📱</p></body></html>');
      win.document.close(); hint.classList.add('show');
    } else {
      const a=document.createElement('a'); a.download='story_telephone.png'; a.href=dataUrl; a.click();
    }
    btn.textContent='⬇️ حفظ الستوري'; btn.disabled=false;
    msg.textContent='✅ تم! احفظ الصورة للاستوديو';
    setTimeout(()=>{msg.textContent=''; hint.classList.remove('show');},6000);
  },300);
}

window.addEventListener('resize',update);
window.addEventListener('load',()=>setTimeout(update,300));
</script>
